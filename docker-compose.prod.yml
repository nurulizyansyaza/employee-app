services:
  app:
    image: ${APP_IMAGE:-ghcr.io/nurulizyansyaza/employee-app:latest}
    container_name: employee-app
    restart: unless-stopped
    env_file: .env.production
    volumes:
      - app-storage:/var/www/storage/app
      - app-logs:/var/www/storage/logs
      - app-public:/var/www/public
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  nginx:
    image: nginx:1.27-alpine
    container_name: employee-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - app-public:/var/www/public:ro
      - nginx-logs:/var/log/nginx
    networks:
      - internal
    depends_on:
      - app
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:16-alpine
    container_name: employee-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-employee_app}
      POSTGRES_USER: ${DB_USERNAME:-employee}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USERNAME:-employee} -d ${DB_DATABASE:-employee_app}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  internal:
    driver: bridge

volumes:
  postgres-data:
    driver: local
  app-storage:
    driver: local
  app-logs:
    driver: local
  app-public:
    driver: local
  nginx-logs:
    driver: local
