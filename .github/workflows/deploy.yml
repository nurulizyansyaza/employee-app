name: CI/CD — Production Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          extensions: pdo, pdo_pgsql, pgsql, mbstring, exif, pcntl, bcmath, gd, zip, opcache, redis
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor/
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction

      - name: Copy environment file
        run: cp .env.example .env

      - name: Set test environment variables
        run: |
          echo "APP_KEY=" >> .env
          echo "DB_CONNECTION=pgsql" >> .env
          echo "DB_HOST=127.0.0.1" >> .env
          echo "DB_PORT=5432" >> .env
          echo "DB_DATABASE=test_db" >> .env
          echo "DB_USERNAME=test_user" >> .env
          echo "DB_PASSWORD=test_password" >> .env

      - name: Generate application key
        run: php artisan key:generate

      - name: Run database migrations
        run: php artisan migrate --force

      - name: Run PHPUnit tests
        run: php artisan test --parallel

  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build-push.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build-push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_SHA=${{ github.sha }}

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
      url: https://employee.nurulizyansyaza.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            DEPLOY_DIR="/opt/employee-app"
            REGISTRY="ghcr.io"
            IMAGE="${REGISTRY}/${{ github.repository }}"
            SHA_TAG="sha-$(echo ${{ github.sha }} | cut -c1-7)"

            echo "==> Logging into GitHub Container Registry"
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${REGISTRY} \
              -u ${{ github.actor }} --password-stdin

            echo "==> Pulling new image: ${IMAGE}:${SHA_TAG}"
            docker pull "${IMAGE}:${SHA_TAG}"
            docker tag "${IMAGE}:${SHA_TAG}" "${IMAGE}:latest"

            echo "==> Deploying application"
            cd ${DEPLOY_DIR}

            export APP_IMAGE="${IMAGE}:${SHA_TAG}"

            docker compose -f docker-compose.prod.yml pull app
            docker compose -f docker-compose.prod.yml up -d --remove-orphans --no-recreate postgres

            echo "==> Running database migrations"
            docker compose -f docker-compose.prod.yml run --rm --no-deps app \
              php artisan migrate --force

            echo "==> Updating application container"
            docker compose -f docker-compose.prod.yml up -d app nginx cloudflared

            echo "==> Clearing and warming caches"
            docker compose -f docker-compose.prod.yml exec -T app \
              php artisan config:cache
            docker compose -f docker-compose.prod.yml exec -T app \
              php artisan route:cache
            docker compose -f docker-compose.prod.yml exec -T app \
              php artisan view:cache

            echo "==> Pruning dangling images"
            docker image prune -f

            echo "==> Deploy complete! $(date)"
