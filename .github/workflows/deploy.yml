name: CI/CD — Production Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          extensions: pdo, pdo_pgsql, pgsql, mbstring, exif, pcntl, bcmath, gd, zip, opcache, redis
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor/
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction

      - name: Copy environment file
        run: cp .env.example .env

      - name: Set test environment variables
        run: |
          echo "APP_KEY=" >> .env
          echo "DB_CONNECTION=pgsql" >> .env
          echo "DB_HOST=127.0.0.1" >> .env
          echo "DB_PORT=5432" >> .env
          echo "DB_DATABASE=test_db" >> .env
          echo "DB_USERNAME=test_user" >> .env
          echo "DB_PASSWORD=test_password" >> .env

      - name: Generate application key
        run: php artisan key:generate

      - name: Run database migrations
        run: php artisan migrate --force

      - name: Run PHPUnit tests
        run: php artisan test

  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build-push.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build-push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_SHA=${{ github.sha }}

  deploy:
    name: Deploy to Production
    runs-on: [self-hosted, Linux, employee-app]
    needs: build
    environment:
      name: production
      url: https://employee.nurulizyansyaza.com
    permissions:
      contents: read
      packages: read

    steps:
      - name: Deploy
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          GIT_SHA: ${{ github.sha }}
          IMAGE: ghcr.io/${{ github.repository }}
        run: |
          set -euo pipefail

          DEPLOY_DIR="/opt/employee-app"
          SHA_TAG="sha-$(echo "${GIT_SHA}" | cut -c1-7)"

          echo "==> Logging into GitHub Container Registry"
          echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin

          echo "==> Pulling new image: ${IMAGE}:${SHA_TAG}"
          docker pull "${IMAGE}:${SHA_TAG}"
          docker tag "${IMAGE}:${SHA_TAG}" "${IMAGE}:latest"

          cd "${DEPLOY_DIR}"

          export APP_IMAGE="${IMAGE}:${SHA_TAG}"
          COMPOSE="docker compose --env-file .env.production -f docker-compose.prod.yml"

          $COMPOSE pull app
          $COMPOSE up -d --remove-orphans --no-recreate --wait postgres

          echo "==> Waiting for postgres to accept connections"
          for i in $(seq 1 30); do
            if $COMPOSE exec -T postgres pg_isready -U "${DB_USERNAME:-employee}" -d "${DB_DATABASE:-employee_app}" >/dev/null 2>&1; then
              echo "Postgres is ready"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Postgres failed to become ready in time" >&2
              $COMPOSE logs postgres
              exit 1
            fi
            sleep 2
          done

          echo "==> Running database migrations"
          $COMPOSE run --rm --no-deps app php artisan migrate --force

          echo "==> Updating application container"
          $COMPOSE up -d app nginx cloudflared

          echo "==> Pruning dangling images"
          docker image prune -f

          echo "==> Deploy complete! $(date -u +%FT%TZ)"
